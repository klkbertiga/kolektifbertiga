<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>AMG Browser · welcome</title>
  <style>
    /* --------------------------------------------
      Sleek dark blue · fully mobile-optimized
      No overlap, touch-friendly, no horizontal scroll.
    -------------------------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c1126;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* container uses full width on mobile, but constrained */
    .welcome-container {
      max-width: 640px;
      width: 100%;
      background: #10162f;
      border: 1px solid #1e274a;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #f0f3ff;
      margin-bottom: 0.9rem;
      line-height: 1.2;
      word-break: break-word;
    }

    .greeting {
      font-size: 1rem;
      color: #cdd6f4;
      margin-bottom: 1.8rem;
      max-width: 100%;
    }

    /* search section — bulletproof for mobile */
    .search-area {
      margin: 1.5rem 0 2rem 0;
    }

    .search-form {
      width: 100%;
    }

    /* flexible row that never wraps, but avoids overlap */
    .search-bar {
      display: flex;
      align-items: stretch;
      width: 100%;
      background: #0a0f23;
      border: 1px solid #232b4e;
      border-radius: 0;        /* keep sharp, minimalist */
    }

    /* icon: fixed width, touch friendly */
    .search-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      flex-shrink: 0;
      color: #7081c2;
    }

    .search-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* input expands, prevents overflow with min-width:0 */
    .search-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      padding: 0.9rem 0.5rem 0.9rem 0;
      font-size: 1rem;
      color: #eef3ff;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
    }

    .search-input::placeholder {
      color: #4a5a8a;
      font-size: 0.95rem;
    }

    /* button with comfortable tap area */
    .search-button {
      flex-shrink: 0;
      background: #1a2352;
      border: none;
      padding: 0 1.2rem;
      color: #e0e7ff;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border-left: 1px solid #232b4e;
      transition: none;
      min-height: 48px;        /* mobile tap target */
      -webkit-tap-highlight-color: transparent;
    }

    .search-button:active {
      background: #222d62;
    }

    .search-hint {
      font-size: 0.7rem;
      color: #6270a4;
      margin-top: 0.7rem;
      letter-spacing: 0.2px;
      padding-left: 0.2rem;
    }

    /* love signature — no overflow */
    .signature {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      color: #8696c9;
      border-top: 1px solid #1e2548;
      padding-top: 1.2rem;
      flex-wrap: wrap;
    }

    /* ----- MOBILE-SPECIFIC OPTIMIZATIONS ----- */
    @media (max-width: 600px) {
      body {
        padding: 0.75rem;
        align-items: flex-start;    /* better scrolling on short screens */
        padding-top: 2rem;
        padding-bottom: 2rem;
      }

      .welcome-container {
        padding: 1.5rem 1.25rem;
      }

      h1 {
        font-size: 1.7rem;
        margin-bottom: 0.6rem;
      }

      .greeting {
        font-size: 0.95rem;
        margin-bottom: 1.5rem;
      }

      .search-icon {
        width: 44px;
      }

      .search-icon svg {
        width: 18px;
        height: 18px;
      }

      .search-input {
        padding: 0.8rem 0.4rem 0.8rem 0;
        font-size: 0.95rem;
      }

      .search-input::placeholder {
        font-size: 0.85rem;
      }

      .search-button {
        padding: 0 1rem;
        font-size: 0.85rem;
        min-height: 46px;
      }

      .signature {
        font-size: 0.85rem;
        gap: 0.35rem;
      }
    }

    /* extra small devices (<= 400px) — ensure no overlap or tiny breaks */
    @media (max-width: 400px) {
      .welcome-container {
        padding: 1.2rem 1rem;
      }

      .search-icon {
        width: 40px;
      }

      .search-button {
        padding: 0 0.8rem;
        font-size: 0.8rem;
      }

      .search-input {
        font-size: 0.9rem;
      }
      
      h1 {
        font-size: 1.5rem;
      }
    }

    /* landscape mode on small heights: keep compact */
    @media (max-height: 500px) and (orientation: landscape) {
      body {
        padding: 0.75rem;
        align-items: center;
      }
      .welcome-container {
        padding: 1rem 1.2rem;
      }
      .search-area {
        margin: 0.8rem 0 1rem 0;
      }
      .signature {
        margin-top: 1rem;
      }
    }

    /* remove any default button styling that could cause weirdness */
    button {
      background: none;
      border: none;
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <h1>AMG Browser</h1>
    <div class="greeting">
      We hope you enjoy using a browser made by Indonesians for literally anybody.
    </div>

    <!-- no-ai DuckDuckGo search — mobile-optimized, no overlap -->
    <div class="search-area">
      <form class="search-form" action="https://noai.duckduckgo.com/" method="GET" target="_blank">
        <div class="search-bar">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="10.5" cy="10.5" r="7.5"></circle>
              <line x1="21" y1="21" x2="15.8" y2="15.8"></line>
            </svg>
          </span>
          <input 
            type="text" 
            name="q" 
            class="search-input" 
            placeholder="Search privately without AI ..." 
            aria-label="Search query"
            autocomplete="off"
            inputmode="search"
          >
          <button type="submit" class="search-button">Search</button>
        </div>
        <div class="search-hint">
          🔍 no-ai DuckDuckGo · private & minimal
        </div>
      </form>
    </div>

    <div class="signature">
      <span>✧</span> 
      <span>with love</span>
      <span>❤️</span>
      <span>🇮🇩</span>
    </div>
  </div>
</body>
</html>
